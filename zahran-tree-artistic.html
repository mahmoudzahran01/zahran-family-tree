<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #FDF8F0;
  font-family: 'Amiri', 'Traditional Arabic', 'Noto Naskh Arabic', serif;
}
#canvas-container {
  width: 100vw; height: 100vh;
  cursor: grab;
  position: absolute;
  top: 0; left: 0;
}
#canvas-container:active { cursor: grabbing; }
svg { display: block; }

#title-overlay {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
}
#title-overlay h1 {
  font-size: 38px;
  color: #3E2723;
  text-shadow: 0 2px 6px rgba(0,0,0,0.12);
  font-weight: 700;
  letter-spacing: 3px;
  background: linear-gradient(135deg, rgba(255,248,225,0.9), rgba(253,245,230,0.85));
  padding: 10px 30px;
  border-radius: 12px;
  border: 2px solid rgba(93,64,55,0.15);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
#title-overlay p {
  font-size: 15px;
  color: #795548;
  margin-top: 6px;
  letter-spacing: 1px;
}

#controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.9);
  padding: 8px 16px;
  border-radius: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
#controls button {
  background: #5D4037;
  color: white;
  border: none;
  border-radius: 50%;
  width: 36px; height: 36px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
#controls button:hover { background: #3E2723; }

#tooltip {
  position: fixed;
  background: rgba(62, 39, 35, 0.92);
  color: #FDF8F0;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 15px;
  pointer-events: none;
  z-index: 100;
  display: none;
  direction: rtl;
  max-width: 280px;
  line-height: 1.6;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}

#legend {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 10;
  background: rgba(255,255,255,0.88);
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  font-size: 12px;
  color: #5D4037;
  direction: rtl;
  font-family: 'Amiri', serif;
}

/* Leaf animation */
@keyframes leafSway {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(3deg); }
}
</style>
</head>

<div id="controls">

<div id="tooltip"></div>

<div id="legend">

function stripFamily(name) {
  return name.replace(/ زهران$/, '');
}

// Count descendants
function countDescendants(node) {
  if (!node.children || node.children.length === 0) return 1;
  let c = 0;
  for (const ch of node.children) c += countDescendants(ch);
  return c;
}

// Flatten tree with depth
function flattenTree(node, depth = 0) {
  const arr = [{ node, depth }];
  if (node.children) {
    for (const ch of node.children) {
      arr.push(...flattenTree(ch, depth + 1));
    }
  }
  return arr;
}

// Assign unique IDs and compute depths
let nodeId = 0;
function assignIds(node, depth = 0) {
  node._id = nodeId++;
  node._depth = depth;
  node._leafCount = countDescendants(node);
  node._isLeaf = !node.children || node.children.length === 0;
  if (node.children) {
    for (const ch of node.children) {
      ch._parent = node;
      assignIds(ch, depth + 1);
    }
  }
}

// Seeded random for consistent look
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

// Position computation using angular allocation
function layoutTree(node, cx, cy, angleStart, angleEnd, depth, branchLen) {
  node._x = cx;
  node._y = cy;
  node._angle = (angleStart + angleEnd) / 2;

  if (!node.children || node.children.length === 0) return;

  const nextLen = Math.max(branchLen * BRANCH_LENGTH_DECAY, MIN_BRANCH_LENGTH);
  const totalWeight = node.children.reduce((s, ch) => s + ch._leafCount, 0);

  let currentAngle = angleStart;
  for (const child of node.children) {
    const share = child._leafCount / totalWeight;
    const childAngleStart = currentAngle;
    const childAngleEnd = currentAngle + share * (angleEnd - angleStart);
    const midAngle = (childAngleStart + childAngleEnd) / 2;

    // Add slight randomness to angle and length
    const angleJitter = (rng() - 0.5) * 3 * (Math.PI / 180);
    const lenJitter = 1 + (rng() - 0.5) * 0.15;

    const effectiveAngle = midAngle + angleJitter;
    const effectiveLen = branchLen * lenJitter;

    // Convert angle to coordinates (angle 0 = up, positive = right)
    const nx = cx + Math.sin(effectiveAngle) * effectiveLen;
    const ny = cy - Math.cos(effectiveAngle) * effectiveLen;

    layoutTree(child, nx, ny, childAngleStart, childAngleEnd, depth + 1, nextLen);
    currentAngle = childAngleEnd;
  }
}

// Branch thickness based on depth and descendant count
function branchWidth(node) {
  if (node._isLeaf) return 1.5;
  const w = Math.max(1.5, Math.sqrt(node._leafCount) * 1.8);
  return Math.min(w, 28);
}

// Branch color based on depth

  const colors = ['#3E2723', '#4E342E', '#5D4037', '#6D4C41', '#795548', '#8D6E63', '#A1887F', '#BCAAA4', '#8D6E63', '#A1887F', '#BCAAA4'];
  return colors[Math.min(depth, colors.length - 1)];
}

// Draw a curved branch between parent and child
function drawBranch(parent, child) {
  const x1 = parent._x, y1 = parent._y;
  const x2 = child._x, y2 = child._y;

  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // Control points for organic bezier curve
  const midX = (x1 + x2) / 2;
  const midY = (y1 + y2) / 2;

  // Perpendicular offset for curve
  const perpX = -dy / dist;
  const perpY = dx / dist;
  const curveAmount = (rng() - 0.5) * dist * 0.2;

  const cx1 = x1 + dx * 0.3 + perpX * curveAmount * 0.5;
  const cy1 = y1 + dy * 0.3 + perpY * curveAmount * 0.5;
  const cx2 = x1 + dx * 0.7 + perpX * curveAmount;
  const cy2 = y1 + dy * 0.7 + perpY * curveAmount;

  const w1 = branchWidth(parent);
  const w2 = branchWidth(child);

  const path = createEl('path', {
    d: `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`,
    stroke: branchColor(child._depth),
    'stroke-width': (w1 + w2) / 2,
    'stroke-linecap': 'round',
    fill: 'none',
    opacity: '0.9'
  });

  if (child._depth <= 2) {
    path.setAttribute('filter', 'url(#trunkGlow)');
  }

  branchG.appendChild(path);
}

const trunkShape = createEl('path', {
  d: `M -16 ${trunkY0} C -14 ${trunkY0 * 0.5}, -10 ${trunkY0 * 0.2}, -6 ${trunkTopY}
      L 6 ${trunkTopY} C 10 ${trunkY0 * 0.2}, 14 ${trunkY0 * 0.5}, 16 ${trunkY0} Z`,
  fill: '#4E342E',
  filter: 'url(#trunkGlow)',
  opacity: '0.95',
  stroke: '#3E2723',
  'stroke-width': '1'
});
branchG.appendChild(trunkShape);

// Bark texture lines
for (let i = 0; i < 7; i++) {
  const ox = (rng() - 0.5) * 18;
  const w = 0.5 + rng() * 1.2;
  const startY = trunkY0 * (0.3 + rng() * 0.6);
  const endY = startY - (20 + rng() * 40);
  const barkLine = createEl('path', {
    d: `M ${ox} ${startY} C ${ox + (rng()-0.5)*6} ${(startY+endY)/2}, ${ox + (rng()-0.5)*4} ${endY + 10}, ${ox + (rng()-0.5)*3} ${endY}`,
    stroke: rng() > 0.5 ? '#2E1B0E' : '#6D4C41',
    'stroke-width': w,
    'stroke-linecap': 'round',
    fill: 'none',
    opacity: String(0.15 + rng() * 0.15)
  });
  branchG.appendChild(barkLine);
}

// Knots on trunk
for (let i = 0; i < 2; i++) {
  const kx = (rng() - 0.5) * 10;
  const ky = trunkY0 * (0.2 + rng() * 0.4);
  const knot = createEl('ellipse', {
    cx: kx, cy: ky,
    rx: 3 + rng() * 2, ry: 2 + rng() * 1.5,
    fill: '#3E2723',
    opacity: '0.3'
  });
  branchG.appendChild(knot);
}

// Draw all branches recursively
function drawBranches(node) {
  if (node.children) {
    for (const child of node.children) {
      drawBranch(node, child);
      drawBranches(child);
    }
  }
}
drawBranches(yousefNode);

// ===== DRAW LEAVES =====
const leafG = createEl('g');
mainG.appendChild(leafG);

function drawLeaf(x, y, scale, rotation) {
  const gradId = leafGradients[Math.floor(rng() * leafGradients.length)];
  // More realistic leaf shape with pointed tip and wider body
  const leafPaths = [
    'M 0,-9 C 3.5,-7 5.5,-2 4,2 C 3,5 1.5,8 0,10 C -1.5,8 -3,5 -4,2 C -5.5,-2 -3.5,-7 0,-9 Z',
    'M 0,-8 C 4,-5 5,0 3,5 C 1.5,8 0,9 0,9 C 0,9 -1.5,8 -3,5 C -5,0 -4,-5 0,-8 Z',
    'M 0,-7 C 3,-5 4.5,-1 3,4 C 2,7 0,9 0,9 C 0,9 -2,7 -3,4 C -4.5,-1 -3,-5 0,-7 Z'
  ];
  const leafD = leafPaths[Math.floor(rng() * leafPaths.length)];
  const leaf = createEl('path', {
    d: leafD,
    fill: `url(#${gradId})`,
    transform: `translate(${x},${y}) rotate(${rotation}) scale(${scale})`,
    opacity: String(0.65 + rng() * 0.35),
    stroke: '#2E7D32',
    'stroke-width': '0.3'
  });
  leafG.appendChild(leaf);
}

// Draw leaves at leaf nodes and scattered near tips
function drawLeaves(node) {
  if (node._isLeaf) {
    // Draw 3-6 leaves at this position for a lush look
    const numLeaves = 3 + Math.floor(rng() * 3);
    for (let i = 0; i < numLeaves; i++) {
      const ox = (rng() - 0.5) * 35;
      const oy = (rng() - 0.5) * 35 - 10;
      const s = 0.8 + rng() * 0.8;
      const rot = rng() * 360;
      drawLeaf(node._x + ox, node._y + oy, s, rot);
    }
  } else if (node._depth >= 4) {
    // Add a couple leaves to branch nodes too for density
    const numLeaves = Math.floor(rng() * 2);
    for (let i = 0; i < numLeaves; i++) {
      const ox = (rng() - 0.5) * 15;
      const oy = (rng() - 0.5) * 15;
      drawLeaf(node._x + ox, node._y + oy, 0.4 + rng() * 0.4, rng() * 360);
    }
  }
  if (node.children) {
    for (const ch of node.children) drawLeaves(ch);
  }
}
drawLeaves(yousefNode);

// Extra scattered leaves in the canopy for fullness
for (const { node } of allNodes) {
  if (node._depth >= 3 && rng() > 0.4) {
    const ox = (rng() - 0.5) * 22;
    const oy = (rng() - 0.5) * 22;
    drawLeaf(node._x + ox, node._y + oy, 0.4 + rng() * 0.5, rng() * 360);
  }
}

// ===== DRAW NAMES =====
const labelG = createEl('g');
mainG.appendChild(labelG);

// Root label (محمد) - at the base of the trunk
function addRootLabel() {
  // Decorative plate behind the name
  const plateY = TRUNK_LENGTH * 0.65 + 22;
  const plate = createEl('rect', {
    x: -55, y: plateY - 14,
    width: 110, height: 32,
    rx: 8, ry: 8,
    fill: '#3E2723',
    opacity: '0.7'
  });
  labelG.appendChild(plate);

  const rootText = createEl('text', {
    x: 0, y: plateY,
    'text-anchor': 'middle',
    'dominant-baseline': 'middle',
    fill: '#FFF8E1',
    'font-size': '14',
    'font-weight': '700',
    'font-family': 'Amiri, serif'
  });
  rootText.textContent = stripFamily(mohammedRoot.name) + ' زهران';
  labelG.appendChild(rootText);

  const rootsLabel = createEl('text', {
    x: 0, y: plateY + 14,
    'text-anchor': 'middle',
    fill: '#BCAAA4',
    'font-size': '9',
    'font-family': 'Amiri, serif',
    opacity: '0.8'
  });
  rootsLabel.textContent = 'الجد الأكبر';
  labelG.appendChild(rootsLabel);
}
addRootLabel();

// Font size by depth
function fontSize(depth) {
  const sizes = [32, 26, 22, 18, 16, 14, 13, 12, 11, 10.5, 10];
  return sizes[Math.min(depth, sizes.length - 1)];
}

function textColor(depth, isLeaf) {
  if (depth <= 1) return '#FFFFFF';
  return '#1B0F00';
}

function textStroke(depth) {
  if (depth <= 1) return '#3E2723';
  return '#FFFFFF';
}

// Draw names along branches or at leaf positions
function drawNames(node) {
  const name = stripFamily(node.name);
  const fs = fontSize(node._depth);
  const color = textColor(node._depth, node._isLeaf);

  if (node._depth === 0 && node === yousefNode) {
    // يوسف on the trunk
    const txt = createEl('text', {
      x: 0, y: -5,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
      fill: '#FFF8E1',
      'font-size': '20',
      'font-weight': '700',
      'font-family': 'Amiri, serif',
      stroke: '#3E2723',
      'stroke-width': '0.5',
      'paint-order': 'stroke'
    });
    txt.textContent = name;
    labelG.appendChild(txt);
  } else if (node._depth <= 2 && !node._isLeaf) {
    // Major branch names - rotated along branch direction
    const parent = node._parent;
    if (parent) {
      const dx = node._x - parent._x;
      const dy = node._y - parent._y;
      let angle = Math.atan2(dy, dx) * 180 / Math.PI;

      // Keep text readable
      if (angle > 90) angle -= 180;
      if (angle < -90) angle += 180;

      const midX = (node._x + parent._x) / 2;
      const midY = (node._y + parent._y) / 2;

      const txt = createEl('text', {
        x: 0, y: 0,
        'text-anchor': 'middle',
        'dominant-baseline': 'middle',
        fill: color,
        'font-size': String(fs),
        'font-weight': '700',
        'font-family': 'Amiri, serif',
        transform: `translate(${midX},${midY}) rotate(${angle})`,
        stroke: textStroke(node._depth),
        'stroke-width': node._depth <= 1 ? '0.5' : '3',
        'paint-order': 'stroke'
      });
      txt.textContent = name;
      labelG.appendChild(txt);
    }
  } else {
    // All other names at their position
    const txt = createEl('text', {
      x: node._x,
      y: node._isLeaf ? node._y - 12 : node._y + 3,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
      fill: color,
      'font-size': String(fs),
      'font-weight': node._isLeaf ? '400' : '600',
      'font-family': 'Amiri, serif',
      'pointer-events': 'all',
      cursor: 'pointer'
    });

    // Add white background stroke for readability on ALL non-trunk nodes
    if (node._depth >= 2) {
      txt.setAttribute('stroke', '#FFFFFF');
      txt.setAttribute('stroke-width', '3.5');
      txt.setAttribute('paint-order', 'stroke');
    }

    txt.textContent = name;
    txt.dataset.nodeId = node._id;
    labelG.appendChild(txt);
  }

  // Draw name for depth 1-2 at their position too (in addition to along branch)
  if (node._depth >= 1 && node._depth <= 2 && !node._isLeaf) {
    const txt2 = createEl('text', {
      x: node._x,
      y: node._y + (fs + 2),
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
      fill: color,
      'font-size': String(fs * 0.7),
      'font-weight': '400',
      'font-family': 'Amiri, serif',
      opacity: '0.7',
      stroke: '#3E2723',
      'stroke-width': '0.2',
      'paint-order': 'stroke'
    });
    txt2.textContent = name;
    labelG.appendChild(txt2);
  }

  if (node.children) {
    for (const ch of node.children) drawNames(ch);
  }
}
drawNames(yousefNode);

// ===== DRAW SMALL CIRCLES AT NODES =====
const dotG = createEl('g');
mainG.appendChild(dotG);

function drawDots(node) {
  if (node._depth >= 2) {
    const r = node._isLeaf ? 2 : Math.min(3, 1.5 + Math.sqrt(node._leafCount) * 0.3);
    const dot = createEl('circle', {
      cx: node._x, cy: node._y,
      r: r,
      fill: node._isLeaf ? '#4CAF50' : branchColor(node._depth),
      stroke: node._isLeaf ? '#2E7D32' : '#3E2723',
      'stroke-width': '0.5',
      opacity: '0.8',
      'pointer-events': 'all',
      cursor: 'pointer'
    });
    dot.dataset.nodeId = node._id;
    dotG.appendChild(dot);
  }
  if (node.children) {
    for (const ch of node.children) drawDots(ch);
  }
}
drawDots(yousefNode);

// ===== TOOLTIP =====
// Build node map
const nodeMap = {};
function buildMap(node) {
  nodeMap[node._id] = node;
  if (node.children) for (const ch of node.children) buildMap(ch);
}
buildMap(TREE_DATA);

svgEl.addEventListener('mouseover', (e) => {
  const id = e.target.dataset?.nodeId;
  if (id !== undefined) {
    const node = nodeMap[id];
    if (!node) return;
    let html = `<strong>${node.name}</strong>`;
    if (node.spouse) html += `<br>الزوج/ة: ${node.spouse}`;
    if (node.children) html += `<br>عدد الأبناء: ${node.children.length}`;
    if (node._parent) html += `<br>الأب: ${node._parent.name}`;
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
  }
});

svgEl.addEventListener('mousemove', (e) => {
  if (tooltip.style.display === 'block') {
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }
});

svgEl.addEventListener('mouseout', (e) => {
  if (e.target.dataset?.nodeId !== undefined) {
    tooltip.style.display = 'none';
  }
});

// ===== PAN & ZOOM =====
let isPanning = false;
let startX, startY;

container.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  isPanning = true;
  startX = e.clientX - transform.x;
  startY = e.clientY - transform.y;
  e.preventDefault();
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  transform.x = e.clientX - startX;
  transform.y = e.clientY - startY;
  applyTransform();
});

window.addEventListener('mouseup', () => { isPanning = false; });

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = -e.deltaY * 0.001;
  const newK = Math.max(0.1, Math.min(10, transform.k * (1 + delta)));
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Zoom toward mouse
  const factor = newK / transform.k;
  transform.x = mx - (mx - transform.x) * factor;
  transform.y = my - (my - transform.y) * factor;
  transform.k = newK;
  applyTransform();
}, { passive: false });

// Touch support
let lastTouchDist = null;
let lastTouchCenter = null;

container.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isPanning = true;
    startX = e.touches[0].clientX - transform.x;
    startY = e.touches[0].clientY - transform.y;
  } else if (e.touches.length === 2) {
    isPanning = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx * dx + dy * dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
  e.preventDefault();
}, { passive: false });

container.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && isPanning) {
    transform.x = e.touches[0].clientX - startX;
    transform.y = e.touches[0].clientY - startY;
    applyTransform();
  } else if (e.touches.length === 2 && lastTouchDist) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const factor = dist / lastTouchDist;
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;

    const newK = Math.max(0.1, Math.min(10, transform.k * factor));
    const kFactor = newK / transform.k;
    transform.x = cx - (cx - transform.x) * kFactor;
    transform.y = cy - (cy - transform.y) * kFactor;
    transform.k = newK;

    // Also pan
    if (lastTouchCenter) {
      transform.x += cx - lastTouchCenter.x;
      transform.y += cy - lastTouchCenter.y;
    }

    lastTouchDist = dist;
    lastTouchCenter = { x: cx, y: cy };
    applyTransform();
  }
  e.preventDefault();
}, { passive: false });

container.addEventListener('touchend', () => {
  isPanning = false;
  lastTouchDist = null;
  lastTouchCenter = null;
});

// Control buttons
document.getElementById('zoom-in').addEventListener('click', () => {
  const cx = W / 2, cy = H / 2;
  const factor = 1.3;
  transform.x = cx - (cx - transform.x) * factor;
  transform.y = cy - (cy - transform.y) * factor;
  transform.k *= factor;
  applyTransform();
});

document.getElementById('zoom-out').addEventListener('click', () => {
  const cx = W / 2, cy = H / 2;
  const factor = 1 / 1.3;
  transform.x = cx - (cx - transform.x) * factor;
  transform.y = cy - (cy - transform.y) * factor;
  transform.k *= factor;
  applyTransform();
});

document.getElementById('zoom-fit').addEventListener('click', () => {
  transform = { x: initTx, y: initTy, k: initScale };
  applyTransform();
});

// ===== ROOTS (decorative) =====
const rootG = createEl('g');
// Insert roots behind branches
mainG.insertBefore(rootG, branchG);

const rootBaseY = TRUNK_LENGTH * 0.65;
// Main thick roots
const rootConfigs = [
  { startX: -8, angle: -40, len: 80, w: 7 },
  { startX: -4, angle: -65, len: 60, w: 5 },
  { startX: 0, angle: -90, len: 45, w: 4 },
  { startX: 4, angle: 65, len: 55, w: 5 },
  { startX: 8, angle: 35, len: 75, w: 6 },
  { startX: 10, angle: 55, len: 50, w: 4 },
  { startX: -10, angle: -55, len: 50, w: 4 },
];

for (const rc of rootConfigs) {
  const radA = (90 + rc.angle) * Math.PI / 180;
  const ex = rc.startX + Math.cos(radA) * rc.len;
  const ey = rootBaseY + Math.sin(radA) * rc.len * 0.6;
  const cpx = rc.startX + Math.cos(radA) * rc.len * 0.5 + (rng() - 0.5) * 15;
  const cpy = rootBaseY + Math.sin(radA) * rc.len * 0.3 + rng() * 10;

  const root = createEl('path', {
    d: `M ${rc.startX} ${rootBaseY} Q ${cpx} ${cpy}, ${ex} ${ey}`,
    stroke: '#5D4037',
    'stroke-width': String(rc.w + rng() * 2),
    'stroke-linecap': 'round',
    fill: 'none',
    opacity: String(0.35 + rng() * 0.15)
  });
  rootG.appendChild(root);

  // Sub-roots branching off
  if (rng() > 0.4) {
    const subX = (rc.startX + ex) / 2 + (rng() - 0.5) * 10;
    const subY = (rootBaseY + ey) / 2;
    const subEx = subX + (rng() - 0.5) * 30;
    const subEy = subY + 10 + rng() * 20;
    const subRoot = createEl('path', {
      d: `M ${subX} ${subY} Q ${(subX + subEx)/2} ${subY + 5}, ${subEx} ${subEy}`,
      stroke: '#6D4C41',
      'stroke-width': String(1 + rng() * 2),
      'stroke-linecap': 'round',
      fill: 'none',
      opacity: String(0.25 + rng() * 0.15)
    });
    rootG.appendChild(subRoot);
  }
}

// Resize handler
window.addEventListener('resize', () => {
  const nw = container.clientWidth;
  const nh = container.clientHeight;
  svgEl.setAttribute('width', nw);
  svgEl.setAttribute('height', nh);
});
</script>
