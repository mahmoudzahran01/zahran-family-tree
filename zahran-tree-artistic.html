<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة زهران</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FDF8F0;
    font-family: 'Amiri', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: linear-gradient(180deg, #FDF8F0 60%, rgba(253,248,240,0));
    padding: 14px 20px 28px;
    text-align: center;
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }

  #title {
    font-size: 38px;
    font-weight: 700;
    color: #3E2723;
    text-shadow: 0 1px 3px rgba(0,0,0,0.07);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  #title-sub {
    font-size: 14px;
    color: #8D6E63;
    margin-bottom: 10px;
  }

  #controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  #search-box {
    font-family: 'Amiri', serif;
    font-size: 16px;
    padding: 6px 16px;
    border: 2px solid #BCAAA4;
    border-radius: 22px;
    background: #fff;
    color: #3E2723;
    outline: none;
    width: 230px;
    text-align: right;
    direction: rtl;
    transition: border-color 0.2s;
  }
  #search-box:focus { border-color: #5D4037; }
  #search-box::placeholder { color: #BCAAA4; }

  .ctrl-btn {
    font-family: 'Amiri', serif;
    font-size: 15px;
    padding: 5px 14px;
    border: 2px solid #BCAAA4;
    border-radius: 22px;
    background: #fff;
    color: #5D4037;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .ctrl-btn:hover { background: #EFEBE9; border-color: #5D4037; }

  #tree-container { width: 100%; height: 100%; }

  .tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(62,39,35,0.96);
    color: #FDF8F0;
    padding: 12px 18px;
    border-radius: 12px;
    font-family: 'Amiri', serif;
    font-size: 15px;
    line-height: 1.8;
    max-width: 300px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.15s;
    direction: rtl;
    text-align: right;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-name { font-weight: 700; font-size: 18px; color: #A5D6A7; }
  .tooltip .tt-row { margin-top: 2px; }
  .tooltip .tt-label { color: #BCAAA4; }

  .search-highlight circle { filter: drop-shadow(0 0 6px #FFD54F) drop-shadow(0 0 14px #FFD54F); }
  .search-highlight .leaf-icon { filter: drop-shadow(0 0 6px #FFD54F) drop-shadow(0 0 14px #FFD54F); }
  .search-highlight .node-label { fill: #E65100 !important; font-weight: 700 !important; }

  .node-group { cursor: pointer; }

  #legend {
    position: fixed;
    bottom: 14px;
    left: 14px;
    background: rgba(255,255,255,0.93);
    border: 1.5px solid #D7CCC8;
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
    color: #5D4037;
    z-index: 100;
    direction: rtl;
    line-height: 2;
  }
  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
  }

  #search-info {
    position: fixed;
    top: 116px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(62,39,35,0.93);
    color: #FDF8F0;
    padding: 5px 18px;
    border-radius: 18px;
    font-family: 'Amiri', serif;
    font-size: 14px;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  #search-info.visible { opacity: 1; }
</style>
</head>
<body>

<div id="header">
  <div id="title">شجرة عائلة زهران</div>
  <div id="title-sub">Zahran Family Tree</div>
  <div id="controls">
    <input id="search-box" type="text" placeholder="ابحث عن اسم..." />
    <button class="ctrl-btn" onclick="zoomIn()">&#43;</button>
    <button class="ctrl-btn" onclick="zoomOut()">&minus;</button>
    <button class="ctrl-btn" onclick="fitToView()">ملائمة</button>
    <button class="ctrl-btn" onclick="expandAll()">توسيع الكل</button>
    <button class="ctrl-btn" onclick="collapseToLevel(3)">طي</button>
  </div>
</div>

<div id="search-info"></div>

<div id="legend">
  <span class="legend-dot" style="background:#5D4037;"></span> ذكر
  &nbsp;&nbsp;
  <span class="legend-dot" style="background:#C2185B;"></span> أنثى
  &nbsp;&nbsp;
  <span style="color:#2E7D32;">&#9679;</span> لديه أبناء
  <br>

</div>

<svg id="tree-container"></svg>
<div class="tooltip" id="tooltip"></div>

      });
      const pad = 100;
      const tw = (x1 - x0) + pad * 2 || 1;
      const th = (y1 - y0) + pad * 2 || 1;
      const scale = Math.min(W / tw, H / th, 3) * 0.88;
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2;
      svg.transition().duration(550).call(
        zoom.transform,
        d3.zoomIdentity.translate(W / 2, H / 2).scale(scale).translate(-cx, -cy)
      );
    };

    window.expandAll = function() {
      (function ex(d) { if (d._children) { d.children = d._children; d._children = null; } if (d.children) d.children.forEach(ex); })(root);
      update(root);
      setTimeout(fitToView, 520);
    };

    window.collapseToLevel = function(lvl) {
      (function col(d) { if (d.children) { d.children.forEach(col); if (d.depth >= lvl) { d._children = d.children; d.children = null; } } })(root);
      update(root);
      setTimeout(fitToView, 520);
    };

    // --- Search ---
    const searchBox = document.getElementById('search-box');
    const searchInfo = document.getElementById('search-info');
    let sTimer;

    searchBox.addEventListener('input', function() {
      clearTimeout(sTimer);
      const q = this.value.trim();
      if (!q) {
        gNodes.selectAll('.node-group').classed('search-highlight', false);
        searchInfo.classList.remove('visible');
        return;
      }
      sTimer = setTimeout(() => {
        // Find matches including collapsed
        function findMatches(node) {
          let res = [];
          if (node.data.name.includes(q)) res.push(node);
          (node.children || node._children || []).forEach(c => res = res.concat(findMatches(c)));
          return res;
        }
        const matches = findMatches(root);

        // Expand ancestors of matches
        matches.forEach(m => {
          let p = m.parent;
          while (p) {
            if (p._children) { p.children = p._children; p._children = null; }
            p = p.parent;
          }
        });
        update(root);

        setTimeout(() => {
          gNodes.selectAll('.node-group').classed('search-highlight', d => d.data.name.includes(q));
          searchInfo.textContent = `عدد النتائج: ${matches.length}`;
          searchInfo.classList.add('visible');

          if (matches.length > 0 && matches[0].rx !== undefined) {
            const t = d3.zoomTransform(svg.node());
            const s = Math.max(t.k, 0.5);
            svg.transition().duration(500).call(
              zoom.transform,
              d3.zoomIdentity.translate(W / 2, H / 2).scale(s).translate(-matches[0].rx, -matches[0].ry)
            );
          }
        }, 480);
      }, 300);
    });

    window.addEventListener('resize', () => {
      W = window.innerWidth; H = window.innerHeight;
      svg.attr('width', W).attr('height', H);
    });

  })(__DATA__);
})();
</script>
</body>
</html>
